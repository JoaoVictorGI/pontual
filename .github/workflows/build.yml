name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v5.5.0
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Run spotless:check
        run: ./mvnw -B spotless:check

      - name: Run tests and generate JaCoCo report
        run: ./mvnw -B verify

      - name: Add coverage to PR
        id: jacoco
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: |
            ${{ github.workspace }}/target/site/jacoco/jacoco-resources/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80