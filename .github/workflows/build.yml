name: Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Run spotless:check
        run: ./mvnw -B spotless:check

      - name: Run tests
        run: ./mvnw -B verify

      - name: Add coverage to PR
        id: jacoco
        if: always()
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-lines: 80
          coverage-counter-type: BRANCH